<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700;800&display=swap" rel="stylesheet"><style>body{font-family:Mulish,sans-serif;margin:0;padding:24px;background:#f6f8fd;color:#131c33}.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}</style>
<style>.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:800}.chip{background:#fdf0d8;color:#92600a;border-radius:7px;padding:3px 8px;font-size:12px;font-weight:700}.mini{display:inline-flex;justify-content:center;min-width:30px;padding:3px 6px;border-radius:7px;font-size:11px;font-weight:800}.pulse{width:7px;height:7px;border-radius:50%;background:#2da44e}</style>
<div class="row">
<span class="pill" style="background:#e4f5e9;color:#1a7f37"><span class="pulse"></span>Active</span>
<span class="pill" style="background:#fdf0d8;color:#92600a">Quiet</span>
<span class="pill" style="background:#eef1f7;color:#5d6c7b">Ready</span>
<span class="pill" style="background:#ffe2e2;color:#b91c1c">Failed</span>
</div>
<div class="row" style="margin-top:14px">
<span class="chip">No image</span><span class="chip">No GTIN</span><span class="chip">Short description</span>
</div>
<div class="row" style="margin-top:14px">
<span class="mini" style="background:#e4f5e9;color:#1a7f37">GPT</span>
<span class="mini" style="background:#e4f5e9;color:#1a7f37">CP</span>
<span class="mini" style="background:#ffe2e2;color:#b91c1c">G</span>
<span class="mini" style="background:#ffe2e2;color:#b91c1c">P</span>
</div>
